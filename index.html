<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poop Tracker | 便便日记</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="glass-header">
            <div class="logo">
                <i class="fa-solid fa-poop"></i>
                <h1>便便日记</h1>
            </div>
            <div class="header-actions" style="display:flex; gap:0.5rem;">
                <button id="syncBtn" class="icon-btn" title="手动同步到云端">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                </button>
                <button id="settingsBtn" class="icon-btn" title="设置 API Key">
                    <i class="fa-solid fa-gear"></i>
                </button>
            </div>
        </header>

        <main class="content-area">
            <section id="logView" class="view active">
                <div class="card form-card">
                    <h2 class="section-title">每日记录</h2>
                    <form id="trackerForm">
                        <div class="form-group">
                            <label for="recordDate"><i class="fa-regular fa-calendar"></i> 记录日期</label>
                            <input type="date" id="recordDate" required>
                        </div>

                        <div id="poopsContainer"></div>
                        
                        <button type="button" id="addPoopBtn" class="outline-btn"><i class="fa-solid fa-plus"></i> 追加当日排便记录</button>

                        <div class="divider"><span>当日生活与作息评估</span></div>

                        <div class="form-group">
                            <label for="meals"><i class="fa-solid fa-utensils"></i> 三餐吃了什么？</label>
                            <textarea id="meals" placeholder="例如：早餐麦片，午餐外卖炸鸡，晚餐轻食沙拉，喝了多少水..." rows="2"></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group half">
                                <label for="mood"><i class="fa-regular fa-face-smile"></i> 心情</label>
                                <select id="mood">
                                    <option value="开心平和">开心平和 😊</option>
                                    <option value="一般般">一般般 😐</option>
                                    <option value="压力大/焦虑">压力大/焦虑 😰</option>
                                    <option value="疲惫">疲惫 😫</option>
                                </select>
                            </div>
                            <div class="form-group half">
                                <label for="exercise"><i class="fa-solid fa-person-running"></i> 运动</label>
                                <select id="exercise">
                                    <option value="无运动">无运动</option>
                                    <option value="轻度(散步)">轻度 (散步)</option>
                                    <option value="中度(慢跑/健身)">中度 (慢跑)</option>
                                    <option value="高强度">高强度运动</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="sleep"><i class="fa-solid fa-bed"></i> 昨晚作息睡眠</label>
                            <input type="text" id="sleep" placeholder="例如：12点睡，8点起，睡得不错">
                        </div>

                        <button type="submit" id="saveBtn" class="primary-btn pulse-btn">保存今日完整记录</button>
                    </form>
                </div>
            </section>

            <section id="historyView" class="view">
                <div class="card">
                    <h2 class="section-title">历史记录</h2>
                    <div id="historyList" class="history-container">
                        <div class="empty-state">暂无记录，快去记一笔吧！</div>
                    </div>
                </div>
            </section>

            <section id="analysisView" class="view">
                <div class="card analysis-card">
                    <h2 class="section-title"><i class="fa-solid fa-wand-magic-sparkles gradient-text"></i> AI 健康分析 & 数据</h2>
                    <p class="analysis-desc">基于您最近 30 天的记录，AI将为您生成专属的肠道健康与生活方式分析报告。</p>
                    <div class="action-row">
                        <button id="generateReportBtn" class="ai-btn" style="flex: 2;">
                            <span class="btn-text">生成 AI 分析报告</span>
                            <div class="spinner hidden"></div>
                        </button>
                        <button id="exportDataBtn" class="primary-btn mt-0" style="flex: 1; min-width: 100px;">
                            <i class="fa-solid fa-file-export"></i> 导出数据
                        </button>
                    </div>
                    <div id="reportContainer" class="report-box hidden">
                        <div class="report-header">
                            <h3>诊断报告</h3>
                            <span class="report-date" id="reportDate"></span>
                        </div>
                        <div id="reportContent" class="report-content"></div>
                    </div>
                </div>
            </section>
        </main>

        <nav class="bottom-nav glass-nav">
            <button class="nav-item active" data-target="logView">
                <i class="fa-solid fa-pen-to-square"></i>
                <span>记录</span>
            </button>
            <button class="nav-item" data-target="historyView">
                <i class="fa-solid fa-list-ul"></i>
                <span>历史</span>
            </button>
            <button class="nav-item ai-tab" data-target="analysisView">
                <div class="ai-icon-bg"><i class="fa-solid fa-robot"></i></div>
                <span>AI分析</span>
            </button>
        </nav>

        <div id="settingsModal" class="modal hidden">
            <div class="modal-content glass-modal">
                <div class="modal-header">
                    <h3>设置</h3>
                    <button id="closeSettings" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="apiKey">Kimi API Key</label>
                        <p class="hint">API Key 仅保存在您的浏览器本地，默认已为您填入提供的Key。</p>
                        <input type="password" id="apiKey" placeholder="sk-...">
                    </div>
                    <div class="divider"><span>数据云同步设置 (推荐使用 GitHub Gist)</span></div>
                    <div class="form-group">
                        <label for="binId">Gist ID & GitHub Token (可选)</label>
                        <p class="hint">填写 GitHub Gist ID 和具备 gist 权限的 Token (PAT) 以开启永久稳定的云同步。</p>
                        <input type="text" id="binId" placeholder="Gist ID (例如: 8a9b...)" style="margin-bottom: 8px;">
                        <input type="password" id="binKey" placeholder="GitHub Token (例如: ghp_...)">
                    </div>
                    <button id="saveSettingsBtn" class="primary-btn">保存</button>
                </div>
            </div>
        </div>
    </div>

    <template id="poopEntryTemplate">
        <div class="poop-entry-card" style="margin-bottom: 20px; padding: 15px; border: 1px dashed var(--primary-color); border-radius: 8px; position: relative; background: rgba(0,0,0,0.1);">
            <button type="button" class="remove-poop-btn" style="position: absolute; top: 10px; right: 10px; background: transparent; border: none; font-size: 1.2rem; cursor: pointer; color: var(--danger);"><i class="fa-solid fa-xmark"></i></button>
            <div class="form-group">
                <label><i class="fa-regular fa-clock"></i> 排便时间</label>
                <input type="time" class="poop-time" required>
            </div>
            <div class="form-group slider-group">
                <label><i class="fa-solid fa-star"></i> 综合自评 (0-100分)</label>
                <input type="range" class="poop-score" min="0" max="100" value="80">
                <div class="scale-labels">
                    <span>很差</span>
                    <span class="score-display" style="font-weight:bold;color:var(--primary-color);">80分</span>
                    <span>完美</span>
                </div>
            </div>
            <div class="form-group slider-group">
                <label><i class="fa-solid fa-droplet"></i> 形状与干湿程度 (1:硬球 - 7:水状)</label>
                <input type="range" class="poop-bristol" min="1" max="7" value="4">
                <div class="scale-labels"><span>干硬</span><span>理想</span><span>稀水</span></div>
            </div>
            <div class="form-group">
                <label><i class="fa-solid fa-palette"></i> 颜色</label>
                <select class="poop-color">
                    <option value="棕色" selected>棕色 (健康)</option>
                    <option value="浅黄">浅黄/金黄</option>
                    <option value="绿色">绿色</option>
                    <option value="黑色">黑色</option>
                    <option value="红色">红色/带血</option>
                    <option value="灰白">灰白色</option>
                </select>
            </div>
            <div class="form-row">
                <div class="form-group half">
                    <label><i class="fa-solid fa-wind"></i> 顺畅度</label>
                    <select class="poop-smoothness">
                        <option value="很顺畅">很顺畅</option>
                        <option value="一般" selected>一般</option>
                        <option value="有些吃力">有些吃力</option>
                        <option value="便秘困难">便秘困难</option>
                    </select>
                </div>
                <div class="form-group half">
                    <label><i class="fa-solid fa-cubes"></i> 粘稠度/挂壁</label>
                    <select class="poop-viscosity">
                        <option value="不粘" selected>不粘马桶</option>
                        <option value="轻微粘">轻微粘落</option>
                        <option value="很粘糊">很粘糊/难冲</option>
                    </select>
                </div>
            </div>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
