<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Poop Tracker | 微软 Fluent版</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="app-container">
        
        <main class="content-area">
            <section id="logView" class="view active">
                <header class="fluent-header">
                    <div>
                        <h1>便便日记</h1>
                    </div>
                    <div class="header-actions">
                        <button id="syncBtn" class="icon-btn" title="手动同步"><i class="fa-solid fa-cloud-arrow-up"></i></button>
                        <button id="settingsBtn" class="icon-btn" title="设置"><i class="fa-solid fa-gear"></i></button>
                    </div>
                </header>
                
                <form id="trackerForm">
                    <div class="fluent-card ios-list-card" style="margin-top: 1rem;">
                        <div class="ios-list-body">
                            <div class="ios-row">
                                <label for="recordDate" class="fluent-label">记录日期</label>
                                <input type="date" id="recordDate" class="fluent-input" required>
                            </div>
                        </div>
                    </div>

                    <div id="poopsContainer"></div>
                    
                    <button type="button" id="addPoopBtn" class="fluent-btn outline"><i class="fa-solid fa-plus"></i> 追加一次排便信息</button>

                    <div class="fluent-card ios-list-card">
                        <h3 class="fluent-card-title list-header">生活作息</h3>
                        <div class="ios-list-body">
                            <div class="ios-row-stacked">
                                <label for="meals" class="fluent-label">饮食记录</label>
                                <textarea id="meals" class="fluent-input" placeholder="例如：麦片..." rows="2" oninput='this.style.height="";this.style.height=this.scrollHeight+"px"'></textarea>
                            </div>
                            
                            <div class="ios-row">
                                <label class="fluent-label">情绪</label>
                                <select class="fluent-input" data-target="mood" dir="rtl">
                                    <option value="开心平和">开心平和</option>
                                    <option value="正常">正常</option>
                                    <option value="压力/焦虑">压力/焦虑</option>
                                    <option value="疲惫">疲惫</option>
                                </select>
                            </div>
                            
                            <div class="ios-row">
                                <label class="fluent-label">运动情况</label>
                                <select class="fluent-input" data-target="exercise" dir="rtl">
                                    <option value="轻度">轻度</option>
                                    <option value="中度">中度</option>
                                    <option value="重度">重度</option>
                                </select>
                            </div>
                            
                            <div class="ios-row">
                                <label for="sleep" class="fluent-label">睡眠时长</label>
                                <input type="text" id="sleep" class="fluent-input" placeholder="例如：8小时">
                            </div>
                        </div>
                    </div>

                    <button type="submit" id="saveBtn" class="fluent-btn primary">提交</button>
                </form>
            </section>

            <section id="historyView" class="view">
                <header class="fluent-header">
                    <div>
                        <h1>历史数据</h1>
                        <p style="color: var(--text-sec); font-size: 0.85rem;">你所有的记录详情</p>
                    </div>
                </header>
                <div id="historyList">
                    <div class="empty-state">暂无记录，快去记一笔吧！</div>
                </div>
            </section>

            <section id="analysisView" class="view">
                <header class="fluent-header">
                    <div>
                        <h1>AI 分析</h1>
                        <p style="color: var(--text-sec); font-size: 0.85rem;">全方位健康洞察</p>
                    </div>
                </header>
                 <div class="fluent-card" style="text-align: center; padding: 2rem 1rem;">
                    <h2>月度趋势诊疗报告</h2>
                    <p style="color:var(--text-sec); font-size: 0.9rem; margin-bottom: 2rem;">整合您最近 30 天的肠道表现与生活习惯模式，交由大语言模型执行极速诊断。</p>
                    
                    <div style="display:flex; gap:0.5rem; justify-content:center;">
                        <button id="generateReportBtn" class="fluent-btn ai-gradient-btn" style="flex:2;">
                            <span class="btn-text" style="display:flex; align-items:center; justify-content:center; gap:6px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3l1.9 5.8 1.9-5.8a2 2 0 0 1 1.3-1.3l5.8-1.9-5.8-1.9a2 2 0 0 1-1.3-1.3Z"></path></svg>生成 AI 诊断</span>
                            <div class="spinner hidden"></div>
                        </button>
                        <button id="exportDataBtn" class="fluent-btn primary" style="flex:1; margin-bottom:0; box-shadow:none;">导出 PDF</button>
                    </div>
                    
                    <div id="reportContainer" class="report-box hidden">
                        <div style="display:flex; justify-content:space-between; align-items:flex-end; border-bottom:1px solid var(--border-light); padding-bottom:10px; margin-bottom:15px;">
                            <h3 style="font-size:1.05rem; font-weight:600;">诊断结果</h3>
                            <span id="reportDate" style="color:var(--text-sec); font-size:0.8rem;"></span>
                        </div>
                        <div id="reportContent" class="report-content" style="text-align:left;"></div>
                    </div>
                 </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" data-target="logView">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 2px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                <span>记录</span>
            </button>
            <button class="nav-item" data-target="historyView">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 2px;"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                <span>历史</span>
            </button>
            <button class="nav-item" data-target="analysisView">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 2px;"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M3 5h4"/></svg>
                <span>洞察</span>
            </button>
        </nav>
        
        <div id="settingsModal" class="modal hidden">
            <div class="fluent-dialog">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1.5rem;">
                    <h3 style="font-size: 1.25rem;">系统设置</h3>
                    <button id="closeSettings" class="icon-btn"><i class="fa-solid fa-xmark"></i></button>
                </div>
                
                <div class="form-group">
                    <label class="fluent-label">API Key (Kimi)</label>
                    <input type="password" id="apiKey" class="fluent-input" placeholder="sk-...">
                </div>
                
                <div class="form-group" style="margin-top: 1.5rem;">
                    <label class="fluent-label">Cloud Sync (GitHub Gist ID)</label>
                    <input type="text" id="binId" class="fluent-input" placeholder="例如: 8a9b...">
                </div>
                <div class="form-group">
                    <label class="fluent-label">GitHub Token</label>
                    <input type="password" id="binKey" class="fluent-input" placeholder="可选免配">
                </div>
                
                <button id="saveSettingsBtn" class="fluent-btn primary" style="margin-top:2rem;">保存并应用</button>
            </div>
        </div>
    </div>

    <!-- The Template for poop entries -->
    <template id="poopEntryTemplate">
        <div class="fluent-card ios-list-card poop-entry-card relative">
            <button type="button" class="remove-poop-btn" title="删除当前记录" style="top: 0rem; right: 0.5rem; z-index: 10;"><i class="fa-solid fa-xmark"></i></button>
            <h3 class="fluent-card-title list-header">生理特征</h3>
            <div class="ios-list-body">
                <div class="ios-row">
                    <label class="fluent-label">排便时间</label>
                    <input type="time" class="fluent-input poop-time" required>
                </div>
                
                <div class="ios-row">
                    <label class="fluent-label">综合自评</label>
                    <input type="number" class="fluent-input poop-score" placeholder="例如：80" min="0" max="100" value="80">
                </div>
                
                <div class="ios-row">
                    <label class="fluent-label">形态 (Bristol)</label>
                    <select class="fluent-input poop-bristol" data-target="poop-bristol" dir="rtl">
                        <option value="1">1型 (干球/羊粪)</option>
                        <option value="2">2型 (块状/香肠)</option>
                        <option value="3">3型 (裂纹/香肠)</option>
                        <option value="4" selected>4型 (光滑/长条)</option>
                        <option value="5">5型 (软块/易排)</option>
                        <option value="6">6型 (糊状/絮状)</option>
                        <option value="7">7型 (水状/腹泻)</option>
                    </select>
                </div>
                
                <div class="ios-row">
                    <label class="fluent-label">颜色</label>
                    <select class="fluent-input" data-target="poop-color" dir="rtl">
                        <option value="棕色">棕色</option>
                        <option value="黄色">黄色</option>
                        <option value="绿色">绿色</option>
                        <option value="黑色">黑色</option>
                        <option value="带血">带血</option>
                        <option value="灰色">灰色</option>
                    </select>
                </div>
                
                <div class="ios-row">
                    <label class="fluent-label">顺畅度</label>
                    <select class="fluent-input" data-target="poop-smoothness" dir="rtl">
                        <option value="很顺畅">极度顺畅</option>
                        <option value="一般">一般水平</option>
                        <option value="有些吃力">有些吃力</option>
                        <option value="便秘困难">便秘艰难</option>
                    </select>
                </div>
                
                <div class="ios-row">
                    <label class="fluent-label">马桶粘连</label>
                    <select class="fluent-input" data-target="poop-viscosity" dir="rtl">
                        <option value="不粘">毫不粘连</option>
                        <option value="轻微粘">轻微粘连</option>
                        <option value="很粘糊">难冲洗级巨糊</option>
                    </select>
                </div>
            </div>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
